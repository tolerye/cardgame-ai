<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FF8FAB">
  <title>6翻了 · 移动版</title>
  <style>
    :root {
      --pink: #FF8FAB;
      --pink-deep: #FF6B9D;
      --pink-light: #FFC1D9;
      --purple: #B197FC;
      --purple-light: #E0CFFF;
      --yellow: #FFD93D;
      --yellow-soft: #FFE680;
      --green: #6BCB77;
      --green-soft: #9DDFA7;
      --red: #FF6B6B;
      --blue: #6BB6FF;
      --orange: #FF9F6B;
      --bg-1: #FFE5F1;
      --bg-2: #E5D4FF;
      --text: #2D2438;
      --text-soft: #6B5B7B;
      --text-dim: #9B8AA8;
      --shadow: 0 4px 14px rgba(255, 107, 157, 0.15);
      --shadow-lg: 0 8px 28px rgba(177, 151, 252, 0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB",
                   "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
      background-attachment: fixed;
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }
    button { font: inherit; cursor: pointer; border: none; background: transparent; color: inherit; }
    input, select { font: inherit; }
    input[type=number]::-webkit-inner-spin-button { display: none; }

    /* ================== App container ================== */
    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ================== Header ================== */
    .top-bar {
      padding: 14px 18px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.5px;
      color: var(--pink-deep);
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.6);
    }
    .top-meta {
      display: flex; gap: 8px; align-items: center;
      font-size: 12px;
      color: var(--text-soft);
    }
    .pill {
      background: white;
      padding: 6px 12px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      font-weight: 600;
      font-size: 12px;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .pill.alive { background: var(--green-soft); color: #1A6B26; }
    .nav-links {
      display: flex; gap: 4px;
      padding: 0 14px 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .nav-links a {
      flex: 0 0 auto;
      padding: 6px 12px;
      background: white;
      color: var(--text-soft);
      text-decoration: none;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      box-shadow: var(--shadow);
    }
    .nav-links a.active { background: var(--pink-deep); color: white; }

    /* ================== Setup screen ================== */
    .setup {
      padding: 20px 16px 100px;
      flex: 1;
    }
    .setup h1 {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 4px;
      color: var(--pink-deep);
    }
    .setup .subtitle {
      text-align: center;
      color: var(--text-soft);
      font-size: 13px;
      margin-bottom: 24px;
    }
    .setup-card {
      background: white;
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .setup-card label {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      font-weight: 600;
      font-size: 14px;
    }
    .setup-card label .label-emoji {
      font-size: 26px;
      flex-shrink: 0;
    }
    .setup-card label .label-text { flex: 1; }
    .setup-card label .label-hint { font-size: 11px; color: var(--text-dim); font-weight: 500; }
    .setup-card input[type=number],
    .setup-card select {
      padding: 10px 14px;
      border-radius: 14px;
      border: 2px solid var(--pink-light);
      background: #FFF5F9;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      min-width: 120px;
      max-width: 180px;
      outline: none;
      transition: border .15s;
    }
    .setup-card input[type=number]:focus,
    .setup-card select:focus { border-color: var(--pink-deep); }
    .setup-card input[type=number] { text-align: center; width: 80px; }
    .setup-card .toggle-row {
      display: flex; align-items: center; gap: 12px; padding: 8px 0;
      border-top: 1px dashed var(--pink-light);
    }
    .setup-card .toggle-row:first-child { border-top: 0; }

    .toggle {
      position: relative; width: 48px; height: 28px;
      background: #E0D6E8; border-radius: 999px;
      transition: background .2s;
      flex-shrink: 0;
    }
    .toggle::after {
      content: ''; position: absolute;
      top: 3px; left: 3px;
      width: 22px; height: 22px;
      background: white; border-radius: 50%;
      box-shadow: 0 2px 4px rgba(0,0,0,.15);
      transition: left .2s;
    }
    .toggle.on { background: var(--green); }
    .toggle.on::after { left: 23px; }

    .start-btn {
      display: block;
      width: 100%;
      padding: 18px;
      margin-top: 24px;
      background: linear-gradient(135deg, var(--pink-deep) 0%, var(--purple) 100%);
      color: white;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1px;
      box-shadow: 0 8px 22px rgba(255, 107, 157, 0.4);
      transition: transform .12s;
    }
    .start-btn:active { transform: scale(.97); }

    /* ================== Game screen ================== */
    .game-screen {
      padding: 0 14px 220px;
      flex: 1;
    }

    /* Hero card (你) */
    .hero {
      background: linear-gradient(135deg, var(--pink-deep) 0%, var(--purple) 100%);
      color: white;
      border-radius: 26px;
      padding: 18px 18px 16px;
      box-shadow: var(--shadow-lg);
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      background: rgba(255,255,255,.12);
      border-radius: 50%;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 100px; height: 100px;
      background: rgba(255,255,255,.08);
      border-radius: 50%;
    }
    .hero-top {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 6px;
      position: relative; z-index: 1;
    }
    .hero-name { font-size: 20px; font-weight: 800; }
    .hero-status { font-size: 12px; opacity: .8; }
    .hero-score {
      font-size: 36px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
      position: relative; z-index: 1;
    }
    .hero-score .target { font-size: 14px; opacity: .7; font-weight: 600; }
    .hero-bar {
      height: 8px;
      background: rgba(255,255,255,.25);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 12px;
      position: relative; z-index: 1;
    }
    .hero-bar-fill {
      height: 100%;
      background: var(--yellow);
      border-radius: 999px;
      transition: width .3s;
    }
    .hero-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px;
      font-size: 13px;
      position: relative; z-index: 1;
    }
    .hero-tag {
      background: rgba(255,255,255,.22);
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 600;
      backdrop-filter: blur(4px);
    }
    .hero-hand {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 12px;
      position: relative; z-index: 1;
    }
    .hand-card {
      width: 38px; height: 50px;
      background: white;
      color: var(--pink-deep);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 2px 6px rgba(0,0,0,.12);
      animation: pop .25s ease-out;
    }
    .hand-card.tag-bonus {
      background: var(--yellow);
      color: var(--text);
    }
    @keyframes pop {
      0% { transform: scale(0) rotate(-12deg); }
      60% { transform: scale(1.1) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    /* Opponent row */
    .opp-section-title {
      font-size: 12px;
      color: var(--text-soft);
      font-weight: 700;
      margin: 4px 0 8px 6px;
      letter-spacing: 1px;
    }
    .opps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .opp-card {
      background: white;
      border-radius: 18px;
      padding: 12px 10px;
      text-align: center;
      box-shadow: var(--shadow);
      position: relative;
      transition: transform .2s, box-shadow .2s;
    }
    .opp-card.is-turn {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(255, 107, 157, 0.35);
      background: linear-gradient(135deg, #FFF5F9 0%, #F3EDFF 100%);
    }
    .opp-card.is-turn::before {
      content: '🎯';
      position: absolute;
      top: -10px; right: -6px;
      font-size: 18px;
      animation: bounce 1s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .opp-card.status-folded { opacity: .65; }
    .opp-card.status-busted { opacity: .55; background: #FFE5E5; }
    .opp-card.status-exiled { opacity: .55; background: #F3E0FF; }
    .opp-emoji {
      font-size: 24px;
      margin-bottom: 2px;
    }
    .opp-name {
      font-size: 11px;
      color: var(--text-soft);
      font-weight: 600;
      line-height: 1.1;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .opp-score {
      font-size: 18px;
      font-weight: 900;
      color: var(--pink-deep);
      line-height: 1;
    }
    .opp-meta {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .opp-status-badge {
      display: inline-block;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 6px;
      margin-top: 3px;
      font-weight: 700;
    }
    .opp-status-badge.folded { background: var(--blue); color: white; }
    .opp-status-badge.busted { background: var(--red); color: white; }
    .opp-status-badge.exiled { background: var(--purple); color: white; }
    .opp-bar {
      height: 4px;
      background: #F3EDFF;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px;
    }
    .opp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 100%);
      border-radius: 999px;
    }

    /* Hint */
    .hint-box {
      background: linear-gradient(135deg, #FFF8DC 0%, #FFE8E8 100%);
      border-radius: 16px;
      padding: 12px 14px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      font-size: 13px;
      color: var(--text);
    }
    .hint-box.danger { background: linear-gradient(135deg, #FFE0E0 0%, #FFB8B8 100%); color: #8B1A1A; }
    .hint-box.success { background: linear-gradient(135deg, #D4F5DC 0%, #ADE8B8 100%); color: #1A5B26; }

    /* Reco panel (collapsed by default, click to expand) */
    .reco-panel {
      background: white;
      border-radius: 16px;
      padding: 12px 14px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      font-size: 12px;
    }
    .reco-panel summary {
      cursor: pointer;
      font-weight: 700;
      color: var(--pink-deep);
      list-style: none;
      display: flex; align-items: center; gap: 6px;
    }
    .reco-panel summary::-webkit-details-marker { display: none; }
    .reco-panel summary::after { content: '▾'; margin-left: auto; transition: transform .2s; }
    .reco-panel[open] summary::after { transform: rotate(180deg); }
    .reco-panel .reco-content { padding-top: 8px; }
    .reco-row {
      display: flex; justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
    }
    .reco-row b { font-weight: 700; }
    .reco-row.danger b { color: var(--red); }
    .reco-row.warn b { color: var(--orange); }
    .reco-row.good b { color: var(--green); }
    .reco-verdict {
      text-align: center;
      padding: 10px;
      border-radius: 12px;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    .reco-verdict.draw { background: var(--green-soft); color: #1A5B26; }
    .reco-verdict.fold { background: var(--yellow-soft); color: #6B5300; }

    /* Event log */
    .log-card {
      background: white;
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .log-card h4 {
      font-size: 12px;
      color: var(--text-soft);
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .log-list { list-style: none; max-height: 160px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .log-list li {
      padding: 4px 0;
      font-size: 12px;
      color: var(--text-soft);
      display: flex; gap: 6px;
      border-bottom: 1px dashed #F3EDFF;
    }
    .log-list li:last-child { border-bottom: 0; }
    .log-list li.is-me { color: var(--pink-deep); font-weight: 600; }
    .log-list li.event-bust { color: var(--red); }
    .log-list li.event-six { color: var(--yellow); font-weight: 700; }
    .log-list li.event-fold { color: var(--blue); }
    .log-list li.event-skill { color: var(--purple); }

    /* Bottom action bar — fixed */
    .actions-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, transparent 0%, var(--bg-2) 30%);
      display: flex;
      gap: 10px;
      z-index: 5;
    }
    .btn-action {
      flex: 1;
      padding: 18px 14px;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 800;
      box-shadow: var(--shadow-lg);
      transition: transform .12s, box-shadow .12s, opacity .15s;
      letter-spacing: 1px;
    }
    .btn-action.btn-draw {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-soft) 100%);
      color: white;
    }
    .btn-action.btn-fold {
      background: linear-gradient(135deg, var(--yellow) 0%, var(--orange) 100%);
      color: var(--text);
    }
    .btn-action:active:not(:disabled) { transform: scale(.96); }
    .btn-action:disabled { opacity: .35; box-shadow: none; }
    .btn-action.your-turn {
      animation: glow 1.4s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 8px 22px rgba(107, 203, 119, 0.4); }
      50% { box-shadow: 0 8px 28px rgba(107, 203, 119, 0.7); }
    }

    /* Modals (bottom sheets) */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(45, 36, 56, 0.5);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn .2s;
    }
    @keyframes fadeIn { from { opacity: 0; } }
    .sheet {
      background: white;
      width: 100%;
      max-width: 480px;
      border-radius: 28px 28px 0 0;
      padding: 22px 18px calc(22px + env(safe-area-inset-bottom));
      box-shadow: 0 -10px 30px rgba(0,0,0,.2);
      animation: slideUp .3s cubic-bezier(.4, 0, .2, 1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } }
    .sheet h3 {
      text-align: center;
      margin-bottom: 12px;
      font-size: 18px;
      font-weight: 800;
      color: var(--pink-deep);
    }
    .sheet p {
      text-align: center;
      color: var(--text-soft);
      font-size: 13px;
      margin-bottom: 16px;
    }
    .skill-targets { display: flex; flex-direction: column; gap: 10px; }
    .skill-target {
      padding: 14px 18px;
      background: linear-gradient(135deg, #FFF5F9 0%, #F3EDFF 100%);
      border-radius: 18px;
      font-size: 15px;
      font-weight: 700;
      transition: transform .12s, background .12s;
      text-align: left;
    }
    .skill-target:active { transform: scale(.97); background: linear-gradient(135deg, #FFE5F1 0%, #E5D4FF 100%); }
    .skill-target.recommended { border: 2px solid var(--pink-deep); }
    .skill-target small { display: block; font-size: 11px; color: var(--text-dim); font-weight: 500; }

    /* Result */
    .result-sheet {
      text-align: center;
    }
    .result-emoji { font-size: 60px; margin-bottom: 6px; }
    .result-title { font-size: 22px; font-weight: 900; margin-bottom: 16px; }
    .result-rank { list-style: none; }
    .result-rank li {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      margin-bottom: 8px;
      border-radius: 14px;
      background: #FFF5F9;
      font-size: 14px;
    }
    .result-rank li.rank-1 { background: linear-gradient(135deg, #FFE680 0%, #FFD93D 100%); }
    .result-rank li.rank-2 { background: linear-gradient(135deg, #F0F0F0 0%, #C9C9C9 100%); }
    .result-rank li.rank-3 { background: linear-gradient(135deg, #FFE5C4 0%, #E8B98A 100%); }
    .result-rank .pos { font-size: 20px; }
    .result-rank .who { flex: 1; font-weight: 700; }
    .result-rank .pts { font-weight: 900; color: var(--pink-deep); }
    .result-rank li.is-me .who::after { content: ' ★'; color: var(--pink-deep); }

    /* Drawn card flash */
    .drawn-card-flash {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: white;
      padding: 20px 28px;
      border-radius: 22px;
      font-size: 28px;
      font-weight: 900;
      box-shadow: 0 12px 40px rgba(0,0,0,.2);
      z-index: 200;
      pointer-events: none;
    }
    .drawn-card-flash.show { animation: flashCard 1.1s ease-out; }
    @keyframes flashCard {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); }
      30% { transform: translate(-50%, -50%) scale(1.15) rotate(5deg); }
      45% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      85% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(.9) rotate(0deg); opacity: 0; }
    }

    /* Confetti for win */
    .confetti {
      position: fixed; pointer-events: none; z-index: 99;
      width: 8px; height: 14px;
      animation: confettiFall 3s linear forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-30vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Quit btn */
    .quit-btn {
      background: white;
      border-radius: 999px;
      padding: 6px 12px;
      box-shadow: var(--shadow);
      font-size: 12px;
      color: var(--text-soft);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Setup screen -->
    <section id="setup">
      <div class="top-bar">
        <div class="logo">🎲 6翻了</div>
        <div class="top-meta"><span class="pill">📱 移动版</span></div>
      </div>
      <div class="nav-links">
        <a href="mobile.html" class="active">📱 手机</a>
        <a href="index.html">💻 桌面</a>
        <a href="advisor.html">🔮 助手</a>
        <a href="winrate.html">📊 胜率</a>
      </div>

      <div class="setup">
        <h1>开局准备</h1>
        <div class="subtitle">挑 3 个对手，准备好就开打 🚀</div>

        <div class="setup-card">
          <label>
            <span class="label-emoji">🎯</span>
            <span class="label-text">
              <span style="display:block">目标分</span>
              <span class="label-hint">先到目标分获胜</span>
            </span>
            <input type="number" id="target-input" value="200" min="50" max="500" step="10">
          </label>
        </div>

        <div class="setup-card">
          <label>
            <span class="label-emoji">🤖</span>
            <span class="label-text">
              <span style="display:block">对手 1</span>
              <span class="label-hint">座位 P1</span>
            </span>
            <select id="opp-1">
              <option value="exmax3" selected>🧠 期望递归 D3</option>
              <option value="exmax4">🧠 期望递归 D4 (最强)</option>
              <option value="exmax2">🧠 期望递归 D2</option>
              <option value="ev">📊 EV 启发式</option>
              <option value="greedy">🤖 贪心 AI</option>
              <option value="random">🎲 随机</option>
            </select>
          </label>
          <label>
            <span class="label-emoji">🤖</span>
            <span class="label-text">
              <span style="display:block">对手 2</span>
              <span class="label-hint">座位 P2</span>
            </span>
            <select id="opp-2">
              <option value="exmax3">🧠 期望递归 D3</option>
              <option value="exmax4">🧠 期望递归 D4 (最强)</option>
              <option value="exmax2">🧠 期望递归 D2</option>
              <option value="ev" selected>📊 EV 启发式</option>
              <option value="greedy">🤖 贪心 AI</option>
              <option value="random">🎲 随机</option>
            </select>
          </label>
          <label>
            <span class="label-emoji">🤖</span>
            <span class="label-text">
              <span style="display:block">对手 3</span>
              <span class="label-hint">座位 P3</span>
            </span>
            <select id="opp-3">
              <option value="exmax3">🧠 期望递归 D3</option>
              <option value="exmax4">🧠 期望递归 D4 (最强)</option>
              <option value="exmax2">🧠 期望递归 D2</option>
              <option value="ev">📊 EV 启发式</option>
              <option value="greedy" selected>🤖 贪心 AI</option>
              <option value="random">🎲 随机</option>
            </select>
          </label>
        </div>

        <div class="setup-card">
          <div class="toggle-row">
            <span class="label-emoji" style="font-size:24px">💡</span>
            <span class="label-text">
              <span style="display:block;font-weight:700">AI 决策建议</span>
              <span class="label-hint">每回合给摸/跑建议</span>
            </span>
            <div class="toggle on" id="t-reco" data-on="true"></div>
          </div>
          <div class="toggle-row">
            <span class="label-emoji" style="font-size:24px">🏆</span>
            <span class="label-text">
              <span style="display:block;font-weight:700">胜率预估</span>
              <span class="label-hint">每回合 MC 模拟 1/2/3/4 名概率</span>
            </span>
            <div class="toggle" id="t-winrate" data-on="false"></div>
          </div>
        </div>

        <button class="start-btn" id="btn-start">开始游戏 🚀</button>
      </div>
    </section>

    <!-- Game screen -->
    <section id="game" hidden>
      <div class="top-bar">
        <div class="logo">🎲 6翻了</div>
        <div class="top-meta">
          <span class="pill">第 <b id="round-num">1</b> 局</span>
          <span class="pill">🃏 <b id="deck-remaining">96</b></span>
          <button class="quit-btn" id="btn-quit">✕</button>
        </div>
      </div>

      <div class="game-screen">
        <!-- Hero card (你) -->
        <div class="hero" id="hero"></div>

        <!-- Hint -->
        <div class="hint-box" id="hint"></div>

        <!-- Reco panel (collapsed) -->
        <details class="reco-panel" id="reco-panel" hidden>
          <summary>💡 AI 决策建议</summary>
          <div class="reco-content" id="reco-content"></div>
        </details>

        <!-- Winrate panel (collapsed) -->
        <details class="reco-panel" id="winrate-panel" hidden>
          <summary>🏆 胜率预估 <button id="winrate-run" style="margin-left:auto;font-size:11px;background:var(--pink-deep);color:white;padding:3px 10px;border-radius:999px">▶ 跑</button></summary>
          <div class="reco-content" id="winrate-content"><div style="font-size:11px;color:var(--text-dim)">点"跑"按钮模拟 200 局</div></div>
        </details>

        <!-- Opponents -->
        <div class="opp-section-title">对手</div>
        <div class="opps" id="opps"></div>

        <!-- Event log -->
        <div class="log-card">
          <h4>📜 最近事件</h4>
          <ul class="log-list" id="log"></ul>
        </div>
      </div>

      <div class="actions-bar">
        <button class="btn-action btn-draw" id="btn-draw" disabled>🎲 摸牌</button>
        <button class="btn-action btn-fold" id="btn-fold" disabled>🔒 跑路</button>
      </div>
    </section>

    <!-- Skill modal -->
    <div id="skill-overlay" class="sheet-overlay" hidden>
      <div class="sheet">
        <h3 id="skill-title"></h3>
        <p id="skill-desc"></p>
        <div class="skill-targets" id="skill-targets"></div>
      </div>
    </div>

    <!-- Result modal -->
    <div id="result-overlay" class="sheet-overlay" hidden>
      <div class="sheet result-sheet">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title"></div>
        <ol class="result-rank" id="result-rank"></ol>
        <button class="start-btn" id="btn-again" style="margin-top:14px">再来一局 🚀</button>
      </div>
    </div>

    <!-- Drawn card flash -->
    <div id="drawn-flash" class="drawn-card-flash"></div>
  </div>

  <script type="module" src="js/mobile.js"></script>
</body>
</html>
